<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Prompt Library</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <h1 class="logo">Prompt Library</h1>
      <p class="tagline">Save and manage your prompts — stored locally</p>
      <div class="header-actions">
        <button id="export-btn" class="btn">Export Prompts</button>
        <label class="btn" for="import-file" style="cursor:pointer;margin-left:8px">Import Prompts</label>
        <input id="import-file" type="file" accept="application/json" style="display:none" />
      </div>
    </header>

    <main class="container">
      <section class="form-panel">
        <form id="prompt-form">
          <label for="title">Title</label>
          <input id="title" name="title" type="text" placeholder="Short descriptive title" required />

          <label for="model">Model</label>
          <input id="model" name="model" type="text" placeholder="e.g. gpt-4o" maxlength="100" required />

          <label class="checkbox-inline"><input id="isCode" name="isCode" type="checkbox" /> Is this prompt code?</label>

          <label for="content">Prompt</label>
          <textarea id="content" name="content" rows="6" placeholder="Write your prompt here" required></textarea>

          <div class="form-actions">
            <button type="submit" class="btn save">Save Prompt</button>
          </div>
        </form>
      </section>

      <section class="prompts-panel">
        <h2>Saved Prompts</h2>
        <div id="prompts-container" class="prompts-grid" aria-live="polite"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
